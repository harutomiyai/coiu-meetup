<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CoIU Meetup | CoIUには、こんな学生がいます。</title>
    <meta
      name="description"
      content="CoIU生を、問い・関心テーマ・活動から見つけられる人物メディア。イベントで出会った学生をあとから探せる入口です。"
    />
    <meta property="og:title" content="CoIU Meetup | CoIUには、こんな学生がいます。" />
    <meta property="og:description" content="CoIU生を、問い・関心テーマ・活動から見つけられる人物メディア。" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/hero/coiu-students.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="CoIU Meetup トップへ">
        <span class="brand-mark">Co</span>
        <span class="brand-text">CoIU Meetup</span>
      </a>
      <nav class="site-nav" aria-label="メインナビゲーション">
        <a class="nav-clip" href="#students">学生を探す</a>
        <button type="button" data-theme-modal-open>テーマから探す</button>
        <a href="/about.html">About</a>
      </nav>
      <form class="site-search" role="search" aria-label="学生検索">
        <label class="sr-only" for="site-search">学生名・テーマで検索</label>
        <input id="site-search" type="search" placeholder="名前・テーマで探す" autocomplete="off" />
      </form>
    </header>

    <main>
      <section id="home-view">
        <!-- Full-width hero slideshow -->
        <section class="hero" id="top" aria-labelledby="hero-title">
          <div class="hero-slideshow" id="hero-slideshow" aria-label="注目の学生">
            <div class="hero-slide-track" id="hero-slide-track"></div>
            <div class="hero-slideshow-dots" id="hero-dots" aria-label="スライド切り替え"></div>
          </div>
          <div class="hero-inner-simple">
            <div class="hero-copy-column">
              <div class="hero-logo-block">
                <p class="hero-kicker">CoIU Meetup</p>
                <h1 id="hero-title">
                  CoIUには、<br>
                  <span class="hero-title-mark">
                    こんな学生
                    <svg viewBox="0 0 220 32" aria-hidden="true" focusable="false">
                      <path d="M5 20 C50 29, 103 5, 156 15 C181 20, 201 25, 216 18" fill="none" stroke="currentColor" stroke-width="9" stroke-linecap="round" />
                    </svg>
                  </span>が<br>
                  います。
                </h1>
                <p class="hero-lead">
                  イベントで出会ったCoIU生を、名前やテーマからもう一度見つけられます。
                </p>
              </div>
              <div class="hero-bottom" aria-label="主要アクション">
                <div class="hero-actions" aria-label="主要アクション">
                  <a class="button button-dark" href="#students">学生を見る</a>
                  <button class="text-button hero-theme-link" type="button" data-theme-modal-open>テーマから探す</button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Pickup featured students -->
        <section class="section section-pickup" aria-labelledby="pickup-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">PICK UP</p>
              <h2 id="pickup-title">注目の学生</h2>
              <p class="section-note">問いと活動で選んだ、今注目の学生たちです。</p>
            </div>
          </div>
          <div id="today-question-card"></div>
        </section>

        <!-- Student list -->
        <section class="section section-topics" id="students" aria-labelledby="students-title">
          <div class="topics-shell">
            <div class="section-heading topics-heading">
              <div>
                <p class="eyebrow">STUDENT LIST</p>
                <h2 id="students-title">学生一覧</h2>
                <p class="section-note wide">問いを読み比べて、話してみたい学生を見つけてください。</p>
              </div>
              <div class="result-head" id="topic-result-head"></div>
            </div>
            <div class="topic-filter">
              <p class="topic-filter-label">テーマで絞り込む</p>
              <div class="topic-list" id="topic-list" aria-label="テーマ一覧"></div>
              <button class="text-button" id="clear-topic" type="button">すべて</button>
            </div>
            <div class="people-grid" id="people-grid"></div>
          </div>
        </section>
      </section>

      <section class="student-detail" id="student-view" hidden aria-live="polite"></section>
    </main>

    <div class="theme-modal" id="theme-modal" hidden role="dialog" aria-modal="true" aria-labelledby="theme-modal-title" aria-describedby="theme-modal-copy">
      <div class="theme-modal-backdrop" data-theme-modal-close></div>
      <div class="theme-modal-panel">
        <button class="theme-modal-close" type="button" data-theme-modal-close aria-label="テーマ選択を閉じる">×</button>
        <p class="eyebrow">INTERESTS</p>
        <h2 id="theme-modal-title">気になるテーマを選んでください</h2>
        <p id="theme-modal-copy">興味に近いCoIU生を表示します。</p>
        <div class="theme-modal-tags" id="theme-modal-tags" aria-label="興味テーマ"></div>
        <button class="text-button" type="button" id="theme-modal-skip">あとで選ぶ</button>
      </div>
    </div>

    <footer class="site-footer">
      <div>
        <strong>CoIU Meetup</strong>
        <p>CoIU生の問い、活動、記事を紹介するサイト。</p>
      </div>
      <a class="button button-outline" href="#students">学生を探す</a>
    </footer>
  </body>
</html>
