<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CoIU生検索 | CoIU Meetup</title>
    <meta
      name="description"
      content="CoIU生を名前、問い、テーマから検索できる一覧ページです。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body data-page="students">
    <header class="site-header">
      <a class="brand" href="/index.html#top" aria-label="CoIU Meetup トップへ">
        <span class="brand-kana">こういう学生に会える場所</span>
        <span class="brand-logo">coiu meetup ...</span>
      </a>
      <nav class="site-nav" aria-label="メインナビゲーション">
        <a href="/index.html#contents">CONTENTS</a>
        <button type="button" data-search-modal-open>SEARCH</button>
        <a href="/coiu.html">CoIUとは</a>
        <a href="/about.html">ABOUT</a>
      </nav>
      <form class="site-search" role="search" aria-label="学生検索">
        <label class="sr-only" for="site-search">学生名・問い・テーマで検索</label>
        <input id="site-search" type="search" placeholder="SEARCH" autocomplete="off" readonly data-search-modal-open />
      </form>
    </header>

    <main>
      <section id="home-view">
        <section class="section feature-section all-students-section" id="feature" aria-labelledby="students-title">
          <div class="section-head">
            <div>
              <p class="section-kicker">ALL STUDENTS / SEARCH</p>
              <h1 id="students-title">CoIU生を検索する</h1>
            </div>
            <a class="small-outline" href="/index.html#feature">トップへ戻る +</a>
          </div>

          <div class="archive-toolbar">
            <div class="topic-filter" aria-label="テーマで探す">
              <p class="topic-filter-label">KEY WORD</p>
              <div class="topic-list" id="topic-list"></div>
              <button class="text-button" id="clear-topic" type="button">CLEAR</button>
            </div>
            <div class="result-head" id="topic-result-head"></div>
          </div>

          <div class="people-grid" id="people-grid"></div>
        </section>
      </section>

      <section class="student-detail" id="student-view" hidden aria-live="polite"></section>
    </main>

    <div
      class="search-modal"
      id="search-modal"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="search-modal-title"
      aria-describedby="search-modal-copy"
    >
      <div class="search-modal-backdrop" data-search-modal-close></div>
      <div class="search-modal-panel">
        <button class="search-modal-close" type="button" data-search-modal-close aria-label="検索を閉じる">×</button>
        <p class="section-kicker">SEARCH</p>
        <h2 id="search-modal-title">CoIU生を探す</h2>
        <p id="search-modal-copy">名前、テーマ、問いの言葉から学生を検索できます。</p>
        <label class="sr-only" for="modal-search-input">キーワードで検索</label>
        <input id="modal-search-input" class="modal-search-input" type="search" placeholder="名前・問い・テーマで検索" autocomplete="off" />
        <div class="search-modal-group">
          <h3>テーマ検索</h3>
          <div class="search-modal-tags" id="search-modal-tags" aria-label="テーマ検索"></div>
        </div>
        <div class="search-modal-group">
          <h3>問い検索</h3>
          <div class="search-modal-questions" id="search-modal-questions" aria-label="問い検索"></div>
        </div>
        <button class="text-button" type="button" data-search-modal-close>CLOSE</button>
      </div>
    </div>

    <footer class="site-footer">
      <div class="footer-brand">
        <span class="brand-kana">こういう学生に会える場所</span>
        <strong>coiu meetup ...</strong>
      </div>
      <nav aria-label="フッターナビゲーション">
        <a href="/index.html#top">TOP</a>
        <a href="/index.html#contents">CONTENTS</a>
        <a href="/coiu.html">CoIUとは</a>
        <a href="/about.html">ABOUT</a>
      </nav>
      <a class="page-top" href="#feature">Page Top +</a>
    </footer>
  </body>
</html>
